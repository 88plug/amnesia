site_name: Amnesia
site_description: 'Context continuity for Claude Code and Grok across compaction — structured handoffs that keep agent memory and working state intact through every `/compact`, auto-compact, and resume.'
site_url: https://88plug.github.io/amnesia/
repo_url: https://github.com/88plug/amnesia
repo_name: 88plug/amnesia
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
